# Local development profile

# H2 Database (file-based for persistence across restarts)
spring.datasource.url=jdbc:h2:file:./data/soccer-recommendations;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (enabled for local development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# More verbose logging for development
logging.level.com.jcm.recommendations.soccer=DEBUG
logging.level.com.jcm.recommendations.soccer.core.client=DEBUG

# SQL logging (comment out if too verbose)
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Scheduler (disabled for local - use manual trigger)
scheduler.enabled=false

# API Key - set this in your local environment or uncomment and add your key
# footystats.api.key=YOUR_API_KEY_HERE
