# Application name
spring.application.name=soccer-recommendations

# Server configuration
server.port=8080

# Logging
logging.level.root=INFO
logging.level.com.jcm.recommendations.soccer=INFO

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Entity and Repository scanning
spring.data.jpa.repositories.bootstrap-mode=default

# Entity package scanning
spring.jpa.properties.hibernate.packagesToScan=com.jcm.recommendations.soccer.domain

# H2 Database (default for development)
spring.datasource.url=jdbc:h2:mem:soccer-recommendations
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (disabled by default in production)
spring.h2.console.enabled=false

# Scheduler (disabled by default)
scheduler.enabled=false
scheduler.cron=0 0 4 * * ?

# FootyStats API
footystats.api.base-url=https://api.football-data-api.com
footystats.api.key=${FOOTYSTATS_API_KEY:}
footystats.api.timeout-seconds=30
footystats.api.max-retries=3

# Enable configuration properties
spring.main.allow-bean-definition-overriding=true
